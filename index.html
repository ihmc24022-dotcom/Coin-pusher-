<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom 3D Coin Pusher</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; user-select: none; }
    #canvas-container { width: 100vw; height: 100vh; display: block; }
    #ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; text-shadow: 2px 2px 2px rgba(0,0,0,0.8); }
    h1 { margin: 0; font-size: 1.5rem; color: #ff00ff; }
    p { margin: 2px 0; font-size: 0.9rem; color: #00ffff; }
    #coin-counter { margin-top: 5px; font-size: 1rem; color: #ffd700; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui">
    <h1>Custom Tinkercad Pusher</h1>
    <p>Tap to drop coins!</p>
    <div id="coin-counter">Active Coins: 0</div>
  </div>

  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 40, 60);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true }); 
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(20, 50, 20);
    scene.add(dirLight);

    const world = new CANNON.World();
    world.gravity.set(0, -20, 0);
    world.broadphase = new CANNON.SAPBroadphase(world); 
    world.allowSleep = true; 

    const physicsMaterial = new CANNON.Material("standard");
    world.addContactMaterial(new CANNON.ContactMaterial(physicsMaterial, physicsMaterial, { friction: 0.2, restitution: 0.0 }));

    const floorBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
    floorBody.addShape(new CANNON.Box(new CANNON.Vec3(50, 1, 50)));
    floorBody.position.set(0, -5, 0);
    world.addBody(floorBody);

    // ==========================================
    // PASTE YOUR HOSTED URLs HERE LATER:
    // ==========================================
    const mtlUrl = 'YOUR_MTL_URL_HERE'; 
    const objUrl = 'YOUR_OBJ_URL_HERE'; 

    const mtlLoader = new THREE.MTLLoader();
    mtlLoader.load(mtlUrl, function (materials) {
        materials.preload();
        const objLoader = new THREE.OBJLoader();
        objLoader.setMaterials(materials);
        objLoader.load(objUrl, function (customModel) {
            customModel.scale.set(0.8, 0.8, 0.8); 
            customModel.position.set(-20, -5, -5); 
            scene.add(customModel);
        });
    });

    const coins = [];
    const counterElement = document.getElementById('coin-counter');
    const coinGeom = new THREE.CylinderGeometry(1.2, 1.2, 0.3, 16); 
    const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
    const coinShape = new CANNON.Cylinder(1.2, 1.2, 0.3, 16);

    function dropCoin() {
        const mesh = new THREE.Mesh(coinGeom, coinMat);
        scene.add(mesh);

        const body = new CANNON.Body({ mass: 1, material: physicsMaterial });
        const q = new CANNON.Quaternion();
        q.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        body.addShape(coinShape, new CANNON.Vec3(0, 0, 0), q);
        body.fixedRotation = true;
        body.allowSleep = true;
        body.sleepSpeedLimit = 0.5; 
        body.sleepTimeLimit = 0.2;  
        body.position.set((Math.random() - 0.5) * 15, 30, (Math.random() - 0.5) * 15);
        
        world.addBody(body);
        coins.push({ mesh, body });
        counterElement.innerText = `Active Coins: ${coins.length}`;
    }

    window.addEventListener('pointerdown', dropCoin);

    const timeStep = 1 / 60;
    function animate() {
        requestAnimationFrame(animate);
        world.step(timeStep);
        for (let i = coins.length - 1; i >= 0; i--) {
            const coin = coins[i];
            if (coin.body.sleepState !== CANNON.Body.SLEEPING) {
                coin.mesh.position.copy(coin.body.position);
                coin.mesh.quaternion.copy(coin.body.quaternion);
            }
            if (coin.body.position.y < -20) {
                world.removeBody(coin.body);
                scene.remove(coin.mesh);
                coins.splice(i, 1);
                counterElement.innerText = `Active Coins: ${coins.length}`;
            }
        }
        renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
